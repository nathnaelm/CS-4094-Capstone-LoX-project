name: LoX
channels:
  - defaults

dependencies:
  - python=3.12
  - pip
  - setuptools
  - wheel

  - pip:
      # PyTorch for GB10 / Blackwell ARM systems.
      # uses the CUDA 13.0 wheel index
      - --index-url https://download.pytorch.org/whl/cu130
      - --extra-index-url https://pypi.org/simple

      # PyTorch stack. Leave unpinned so pip selects the CUDA 13.0/aarch64-compatible wheels.
      - torch
      - torchvision
      - torchaudio

      # Hugging Face / LoX fine-tuning stack
      - accelerate==1.7.0
      - datasets==4.0.0
      - evaluate==0.4.1
      - huggingface-hub==0.32.3
      - peft==0.8.2
      - safetensors==0.5.3
      - sentencepiece==0.2.0
      - tokenizers==0.21.1
      - transformers==4.53.3
      - trl==0.18.1

      # Common training/eval utilities
      - tensorboard
      - protobuf
      - tqdm
      - pandas
      - pyarrow
      - scipy
      - matplotlib
      - psutil
      - pyyaml
      - requests
      - rich
      - regex
      - packaging
      - nvidia-ml-py

